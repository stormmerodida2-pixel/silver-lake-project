name: CI

# Runs the Django test suite, the frontend build, and the Playwright e2e suite on every
# push/PR - deploy only fires once all three pass (see each job's own `needs`/gating below).
# The `security` job (pip-audit/npm audit) runs alongside these but deliberately doesn't gate
# deploy - see its own comment. There used to be a second, near-identical set of jobs for a
# duplicate nested silverlake/ project tree - that tree has been removed (it was pure
# redundancy, not a real second environment) so this only tests the one real project now.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: >
          python manage.py test
          accounts.tests fleet.tests drivers.tests bookings.tests payments.tests
          reviews.tests announcements.tests blog.tests notifications.tests core.tests
          --settings=settings.local

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # Reports known CVEs in the exact currently-pinned versions (pip-audit checks requirements.txt
  # against the PyPA advisory database; npm audit checks package-lock.json) - the reactive
  # counterpart to Dependabot (.github/dependabot.yml), which proactively opens update PRs on a
  # schedule instead. Deliberately not in deploy's own `needs` list below - a newly-disclosed CVE
  # in some transitive dependency shouldn't be able to block shipping unrelated work, it should
  # just be visible as its own failing check.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm audit --audit-level=high

  # Drives a real browser against the real app - backend and frontend both have to run in this
  # same job (not split like the two jobs above) since they need to reach each other over
  # localhost. Mirrors frontend/e2e/README.md's own local setup exactly: migrate, seed, backend
  # in the background, then `npm run test:e2e` (which starts the frontend dev server itself, per
  # playwright.config.js's webServer block).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python manage.py migrate --settings=settings.local
      - run: python manage.py seed_e2e_data --settings=settings.local
      - run: python manage.py runserver --settings=settings.local &
      - name: Wait for the backend to come up
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/vehicles/ > /dev/null && exit 0
            sleep 1
          done
          echo "Backend never came up" && exit 1
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      - working-directory: frontend
        run: npm run test:e2e
        env:
          VITE_API_BASE_URL: http://localhost:8000/api/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results
          retention-days: 7

  # Builds the backend's Dockerfile, pushes it to ECR, then SSHes into the EC2 instance to pull
  # and restart it - chosen over AWS App Runner specifically because App Runner has no free-tier
  # allowance at all, while a single t2/t3.micro EC2 instance is free for 12 months. This trades
  # App Runner's managed HTTPS/scaling/auto-deploy for a one-time manual nginx+certbot+Docker
  # setup on the box itself (see README's Deployment section) - CI only ships and restarts the
  # container, it doesn't touch nginx/TLS/the box's own config. Only runs on an actual push to
  # main (never on a PR, and only after both test jobs above pass).
  deploy:
    needs: [backend, frontend, e2e]
    # Also requires the secrets below to actually be set - skipped (not failed) until the
    # AWS_DEPLOY_READY repo variable is flipped to 'true', so CI stays green while the EC2 box
    # isn't set up yet rather than red on every push to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AWS_DEPLOY_READY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login
      # Tagged only with the commit SHA, never `latest` - the ECR repo has tag immutability on,
      # which is a good thing to keep (it stops an image already deployed from silently being
      # swapped out from under you), but means a reused mutable tag can never be pushed twice.
      # Every deploy is therefore for an exact, unambiguous commit - also makes rollback trivial
      # (redeploy any prior commit's own SHA tag).
      - run: |
          IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
      # The EC2 instance authenticates to ECR itself via its own IAM instance role (see README) -
      # no AWS keys are placed on the box or passed over SSH, only the image gets pulled. The
      # media volume mount matters: Django doesn't serve MEDIA_URL itself when DEBUG=False (see
      # silverlake/urls.py), so nginx serves /media/ directly from this same host path instead -
      # without the mount, uploaded vehicle/driver photos would 404 after every deploy.
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ steps.ecr-login.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}"
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}
            docker pull "$IMAGE"
            mkdir -p /home/${{ secrets.EC2_USER }}/media
            docker stop silverlake-api || true
            docker rm silverlake-api || true
            docker run -d --name silverlake-api --restart unless-stopped -p 8000:8000 -v /home/${{ secrets.EC2_USER }}/media:/app/media --env-file /home/${{ secrets.EC2_USER }}/silverlake.env "$IMAGE"
            # ECR's tag immutability means every deploy pushes a genuinely new, uniquely-tagged
            # image - without this, the free-tier instance's small disk fills up after a handful
            # of deploys (already happened once) and even the pull for the NEXT deploy fails.
            # Safe to prune everything unused: the container just started above is the only
            # thing that needs to keep its image.
            docker image prune -af

      # Frontend: built here (not in the `frontend` job above) so it picks up the real production
      # API URL - the `frontend` job's own build is just a compile-sanity-check on every push/PR,
      # this is the one that actually ships. Uploaded to a staging path first, then moved into
      # nginx's serving root as a second SSH step - nginx (and the one-time certbot/reverse-proxy
      # config) was set up manually once; see README's Deployment section.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.PRODUCTION_URL }}/api
          VITE_GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
      - uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: frontend/dist/*
          target: /home/${{ secrets.EC2_USER }}/frontend-dist-new
          strip_components: 2
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            sudo rm -rf /var/www/silverlake
            sudo mkdir -p /var/www/silverlake
            sudo cp -r /home/${{ secrets.EC2_USER }}/frontend-dist-new/* /var/www/silverlake/
            sudo chown -R www-data:www-data /var/www/silverlake
            sudo chmod -R 755 /var/www/silverlake
            rm -rf /home/${{ secrets.EC2_USER }}/frontend-dist-new
