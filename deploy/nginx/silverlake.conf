server {
    server_name 13-127-111-71.sslip.io 13.127.111.71 silverlakecarentals.com;

    client_max_body_size 20M;

    # Security headers. Also repeated verbatim inside the media/, assets/, and / locations below -
    # nginx's add_header inheritance is all-or-nothing per context, and each of those locations
    # already sets its own Cache-Control add_header, which stops them inheriting these entirely.
    # Left here too so the /api/ proxy_pass location (which sets no add_header of its own) still
    # gets them via normal inheritance. Values
    # match Django's SecurityMiddleware exactly (settings/production.py's SECURE_* settings) where
    # both apply, so a request that gets both (e.g. /api/) sees the same value twice, never a
    # conflicting one.
    # CSP allowlist, audited against the actual frontend source (frontend/src):
    #   script-src:  self + Google tag manager (gtag.js, VITE_GA_MEASUREMENT_ID - see utils/analytics.js)
    #   img-src:     self + OpenStreetMap tiles (TrackVehicleMap.vue, AdminFleetMapView.vue) + GA
    #                pixel + the silverlake-demo S3 bucket (vehicle/driver photos, presigned URLs -
    #                confirmed live, django-storages[s3] is actually in use in production, not just
    #                installed-but-dormant as assumed)
    #   connect-src: self + GA + Sentry ingest (utils/errorTracking.js, VITE_SENTRY_DSN - not yet
    #                set in production, but allowlisted now so turning it on later needs no
    #                further nginx change). Used to also need 13-127-111-71.sslip.io because
    #                VITE_API_BASE_URL (CI's PRODUCTION_URL var) pointed API calls at that host
    #                instead of this domain's own /api/ - fixed by pointing PRODUCTION_URL at
    #                https://silverlakecarentals.com and redeploying, confirmed live (a real-browser
    #                check shows zero requests to the sslip.io host now), so that carve-out is gone.
    #   frame-src:   self + Google Maps embed (ContactView.vue's <iframe>)
    #   style-src:   'unsafe-inline' - Vue/Tailwind's :style bindings and Leaflet's own inline
    #                styles rely on it; no equivalent inline-script usage exists, so script-src
    #                stays strict.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://silverlake-demo.s3.amazonaws.com https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://*.ingest.de.sentry.io; frame-src 'self' https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # gzip: nothing here was compressing responses before this - the SPA's JS/CSS bundles were
    # being sent to every visitor at full size. text/html isn't listed since it's already tiny
    # (index.html) and changes on every deploy - not worth the CPU cost to compress.
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/xml
        text/plain
        image/svg+xml;

    # Legacy fallback for any file uploaded before django-storages[s3] was wired into production -
    # new uploads go straight to S3 (see settings/production.py's STORAGES config and the
    # silverlake-demo bucket referenced in the CSP's img-src below), but this location still needs
    # to exist for older media that was never migrated off the host-mounted volume.
    location /media/ {
        alias /home/ubuntu/media/;
        add_header Cache-Control "public, max-age=604800";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://silverlake-demo.s3.amazonaws.com https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://*.ingest.de.sentry.io; frame-src 'self' https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Backend API, sitemap, and Django-collected static assets (whitenoise serves these itself
    # from inside gunicorn, so just proxying through is simplest).
    location ~ ^/(api|sitemap\.xml|static)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite's own build output (hashed filenames, e.g. index-B44JZSG1.js) - a new deploy always
    # produces new filenames, so it's safe to cache these as hard as possible; a stale cached
    # copy can never be served under the wrong content since the URL itself would have changed.
    location /assets/ {
        root /var/www/silverlake;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://silverlake-demo.s3.amazonaws.com https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://*.ingest.de.sentry.io; frame-src 'self' https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Everything else is the Vue SPA - try the exact file first (JS/CSS/images), then fall back
    # to index.html so client-side (history-mode) routing handles the path instead of nginx 404ing.
    # index.html itself is deliberately NOT cached - it's what references the current hashed
    # asset filenames, so a stale cached copy would keep pointing at JS/CSS a previous deploy
    # already deleted.
    location / {
        root /var/www/silverlake;
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.tile.openstreetmap.org https://silverlake-demo.s3.amazonaws.com https://www.google-analytics.com; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://*.ingest.de.sentry.io; frame-src 'self' https://www.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/13-127-111-71.sslip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/13-127-111-71.sslip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot






}
server {
    listen 443 ssl;
    server_name www.silverlakecarentals.com;
    ssl_certificate /etc/letsencrypt/live/13-127-111-71.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13-127-111-71.sslip.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://silverlakecarentals.com$request_uri;
}
server {
    if ($host = www.silverlakecarentals.com) {
        return 301 https://silverlakecarentals.com$request_uri;
    } # managed by Certbot


    if ($host = silverlakecarentals.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = 13-127-111-71.sslip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name 13-127-111-71.sslip.io 13.127.111.71 silverlakecarentals.com www.silverlakecarentals.com;
    return 404; # managed by Certbot






}
