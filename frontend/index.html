<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SilverLake Car Rentals | Car Hire in Kisumu &amp; Across Kenya</title>
    <meta
      name="description"
      content="SilverLake Car Rentals - premium car hire in Kisumu with drivers or self-drive. Prado, Voxy, Axio and vans available. Book instantly via WhatsApp or M-Pesa."
    />
    <meta name="keywords" content="car hire Kisumu, car rental Kenya, self drive Kisumu, Prado hire Kisumu, van hire Kisumu" />
    <!-- Static, not just utils/seo.js's dynamic setPageMeta() - social crawlers (Facebook,
         WhatsApp, Twitter/X, LinkedIn) fetch raw HTML and don't execute JS, so a tag only added
         after Vue mounts is invisible to them. This is the real fallback every link preview
         actually sees; setPageMeta() only overrides it for a page already open in a browser
         (e.g. a blog post using its own cover image). -->
    <meta property="og:site_name" content="SilverLake Car Rentals" />
    <meta property="og:title" content="SilverLake Car Rentals | Car Hire in Kisumu &amp; Across Kenya" />
    <meta
      property="og:description"
      content="SilverLake Car Rentals - premium car hire in Kisumu with drivers or self-drive. Prado, Voxy, Axio and vans available. Book instantly via WhatsApp or M-Pesa."
    />
    <!-- Absolute URLs, not relative - most link-preview crawlers (WhatsApp, Facebook, Slack,
         LinkedIn) resolve og:image/og:url against whatever they think the page's own URL is,
         which isn't reliable across a redirect chain (http->https, apex<->www) - a relative path
         here has silently failed to show an image on some of them. -->
    <meta property="og:url" content="https://silverlakecarentals.com/" />
    <meta property="og:image" content="https://silverlakecarentals.com/og-image.png" />
    <meta property="og:image:width" content="1695" />
    <meta property="og:image:height" content="928" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SilverLake Car Rentals | Car Hire in Kisumu &amp; Across Kenya" />
    <meta
      name="twitter:description"
      content="SilverLake Car Rentals - premium car hire in Kisumu with drivers or self-drive. Prado, Voxy, Axio and vans available. Book instantly via WhatsApp or M-Pesa."
    />
    <meta name="twitter:image" content="https://silverlakecarentals.com/og-image.png" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
