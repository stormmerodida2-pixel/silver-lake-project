<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject|default:"SilverLake Car Rentals" }}</title>
</head>
<body style="margin:0; padding:0; background-color:#eef1f6; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#eef1f6; padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="width:560px; max-width:100%; background-color:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 1px 3px rgba(10,23,48,0.1);">

          <!-- Header -->
          <tr>
            <td style="background-color:#0a1730; padding:28px 32px; text-align:center;">
              <div style="font-family:Georgia,'Times New Roman',serif; font-size:24px; font-weight:bold; color:#ffffff; letter-spacing:1px;">
                SILVERLAKE
              </div>
              <div style="font-size:11px; letter-spacing:4px; color:#c9a227; margin-top:2px;">
                CAR RENTALS
              </div>
            </td>
          </tr>

          <!-- Gold divider -->
          <tr>
            <td style="height:3px; background-color:#c9a227; font-size:0; line-height:0;">&nbsp;</td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:36px 32px; color:#1e2937; font-size:15px; line-height:1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8fafc; padding:20px 32px; text-align:center; font-size:12px; color:#64748b; border-top:1px solid #e5e7eb;">
              SilverLake Car Rentals &middot; Kisumu, Kenya<br>
              0790 111 000 &middot; info@silverlakecarrentals.co.ke
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
